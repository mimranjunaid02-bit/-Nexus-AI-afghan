<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استاد یار - محمد عمران عمر</title>
    <style>
        :root {
            --main-blue: #1a5f7a;
            --light-blue: #86b6bb;
            --accent-orange: #e67e22;
            --white: #ffffff;
            --gray: #f4f7f6;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--gray);
            margin: 0;
            padding: 0;
            color: #333;
        }
        .sidebar {
            width: 260px;
            background-color: var(--main-blue);
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            color: white;
            padding: 20px;
        }
        .main-content {
            margin-right: 300px;
            padding: 40px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .upload-area {
            border: 2px dashed var(--light-blue);
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-area:hover {
            background-color: #eef9f9;
        }
        .btn {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
        .info-box {
            background: #e1eef3;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.8;
            border-right: 4px solid var(--main-blue);
        }
        h2 { color: var(--main-blue); }
        .tab-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: right;
            border-radius: 5px;
            cursor: pointer;
        }
        .tab-btn.active { background: var(--accent-orange); border: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: white; border-bottom: 1px solid white; padding-bottom: 10px;">استاد یار AI</h2>
    <button class="tab-btn active">درسي سیسټم</button>
    <button class="tab-btn" onclick="showSettings()">شخصي تنظیمات</button>
    
    <div style="margin-top: 50px;">
        <p><strong>جوړوونکی:</strong></p>
        <div class="info-box" style="color: #333;">
            محمد عمران عمر<br>
            د کابل پوهنتون محصل<br>
            ارواپوهنه او تربیتی علوم<br>
            وردک، جغتو
        </div>
    </div>
</div>

<div class="main-content">
    <div id="planner">
        <div class="card">
            <h2>د درسي پلان او پوښتنو جوړونکی</h2>
            <p>خپل درسي PDF یا چپټر دلته اپلوډ کړئ ترڅو ټول پلانونه په اتومات ډول جوړ شي.</p>
            
            <div class="upload-area" id="dropZone">
                <p>درسي فایل (PDF/DOCX) دلته کش کړئ یا کلیک وکړئ</p>
                <input type="file" id="fileInput" style="display: none;">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                <div>
                    <label>د پلان وخت:</label>
                    <select id="timeRange" style="width:100%; padding: 10px; margin-top: 5px;">
                        <option>ساعتوار (فی ساعت)</option>
                        <option>اونیز (هفته وار)</option>
                        <option>میاشتنی</option>
                        <option>کلنی پلان</option>
                    </select>
                </div>
                <div>
                    <label>د محصول ژبه:</label>
                    <select id="lang" style="width:100%; padding: 10px; margin-top: 5px;">
                        <option>پښتو</option>
                        <option>دري</option>
                        <option>English</option>
                    </select>
                </div>
            </div>

            <button class="btn" onclick="generateOutput()">پلان او سوالونه جوړ کړه</button>
        </div>

        <div class="card" id="resultCard" style="display: none;">
            <h3>نتیجه:</h3>
            <div id="aiOutput" style="background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.onclick = () => fileInput.click();

    function generateOutput() {
        document.getElementById('resultCard').style.display = 'block';
        document.getElementById('aiOutput').innerHTML = `
            <p><strong>۱. درسي اهداف:</strong> د اپلوډ شوي فایل مطابق استخراج شول...</p>
            <p><strong>۲. تدریسي میتود:</strong> فعال تدریس، پوښتنه او ځواب، او ګروپي کار.</p>
            <p><strong>۳. پوښتنې (سخت، متوسط، اسانه):</strong> ۳۰ سوالونه چمتو شول.</p>
            <p><strong>۴. د رخصتۍ او ازموینې مهالوېش:</strong> د کلني تقویم مطابق تنظیم شول.</p>
            <p style="color:green;">✓ فایل په بریالیتوب سره تحلیل شو.</p>
        `;
    }

    function showSettings() {
        alert("اوسنی اډمین: محمد عمران عمر\nد کابل پوهنتون د ارواپوهنې او تربیتی علومو محصل\nولایت: وردک، ولسوالی: جغتو");
    }
</script>

</body>
</html>
