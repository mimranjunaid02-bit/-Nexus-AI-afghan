<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Stable Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #fff; }
        .header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 100; }
        #chatBox { height: 75vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px; border-radius: 20px; max-width: 85%; font-size: 15px; line-height: 1.6; }
        .user { background: #e9eef6; align-self: flex-end; border-radius: 20px 20px 4px 20px; }
        .ai { background: #f8f9fa; align-self: flex-start; border-right: 4px solid #1a73e8; white-space: pre-wrap; }
        .input-bar { position: fixed; bottom: 15px; width: 90%; left: 50%; transform: translateX(-50%); background: #f0f4f9; border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; }
        input { flex: 1; border: none; background: transparent; outline: none; padding: 10px; font-size: 16px; }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-cog" onclick="setupKey()" style="cursor:pointer; color: #5f6368;"></i>
    <h1 style="font-size:18px; color: #1a73e8;">Nexus AI</h1>
    <i class="fas fa-user-circle" style="font-size:24px; color: #5f6368;"></i>
</div>

<div id="chatBox">
    <div class="msg ai">سلام عمران جانه! نکسس چمتو دی. <br>که ځواب نه درکوي، پورته په تیري (Settings) کلیک وکړه او نوې کیلي ورکړه.</div>
</div>

<div class="input-bar">
    <input type="text" id="userInput" placeholder="دلته پوښتنه ولیکئ...">
    <i class="fas fa-paper-plane" onclick="askAi()" style="color:#1a73e8; cursor:pointer; font-size: 20px;"></i>
</div>

<script>
    let apiKey = localStorage.getItem('nexus_key') || "";

    function setupKey() {
        const key = prompt("خپله نوې API Key دلته پیسټ کړئ:");
        if(key) {
            apiKey = key;
            localStorage.setItem('nexus_key', key);
            alert("کیلي خوندي شوه!");
        }
    }

    async function askAi() {
        const input = document.getElementById('userInput');
        const box = document.getElementById('chatBox');
        const text = input.value.trim();

        if(!text) return;
        if(!apiKey) { alert("مهرباني وکړئ لومړی کیلي تنظیم کړئ."); return; }

        box.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = "";
        
        const aiDiv = document.createElement('div');
        aiDiv.className = "msg ai";
        aiDiv.innerText = "نکسس فکر کوي...";
        box.appendChild(aiDiv);
        box.scrollTop = box.scrollHeight;

        try {
            // ساده او باثباته غوښتنه (پرته له جنجالي فیچرونو)
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                aiDiv.innerText = data.candidates[0].content.parts[0].text;
            } else {
                aiDiv.innerText = "تېروتنه: ګوګل ستا کیلي بنده کړې ده. مهرباني وکړه نوې کیلي جوړه کړه.";
            }
        } catch (e) {
            aiDiv.innerText = "ارتباط قطع شو. یو ځل VPN چالان کړه.";
        }
        box.scrollTop = box.scrollHeight;
    }
</script>
</body>
</html>
