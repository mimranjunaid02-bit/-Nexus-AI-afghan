<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استاد یار | Ustad Yar</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #2b7cff;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.container {
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #2b7cff;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #1a5edb;
}

.output {
    background: #eef3ff;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<header>📘 استاد یار | Ustad Yar</header>

<div class="container">

<div class="card">
<h3>👤 User Info</h3>
<p>محمد عمران عمر | وردک - جغتو</p>
</div>

<div class="card">
<h3>🌐 Language</h3>
<select id="lang">
<option>Pashto</option>
<option>Dari</option>
<option>English</option>
</select>
</div>

<div class="card">
<h3>📚 Lesson Plan</h3>
<input type="text" id="subject" placeholder="Subject">
<input type="text" id="topic" placeholder="Topic">
<button onclick="generatePlan()">Generate Plan</button>

<div id="planOutput" class="output"></div>
</div>

<div class="card">
<h3>📂 Upload File</h3>
<input type="file" id="file">
</div>

<div class="card">
<h3>❓ Question Generator</h3>
<button onclick="generateQuestions()">Generate Questions</button>

<div id="questionOutput" class="output"></div>
</div>

</div>

<script>
function generatePlan() {
    let subject = document.getElementById("subject").value;
    let topic = document.getElementById("topic").value;

    document.getElementById("planOutput").innerHTML = `
    <b>Subject:</b> ${subject} <br>
    <b>Topic:</b> ${topic} <br><br>

    🎯 Objective: Understand ${topic} <br>
    🧠 Activities: Explanation, Practice, Group Work <br>
    📊 Assessment: Quiz + Homework
    `;
}

function generateQuestions() {
    let topic = document.getElementById("topic").value;

    document.getElementById("questionOutput").innerHTML = `
    🟢 Easy: What is ${topic}? <br><br>
    🟡 Medium: Explain ${topic} with example. <br><br>
    🔴 Hard: Analyze ${topic} in detail.
    `;
}
</script>

</body>
    </html>
