<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Powered by Gemini</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gemini-blue: #1a73e8; --bg-color: #ffffff; --chat-bg: #f8f9fa; --text: #1f1f1f; }
        body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background-color: var(--bg-color); margin: 0; color: var(--text); overflow-x: hidden; }
        
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 18px; margin: 0; color: #444; font-weight: 500; }
        
        .main-content { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; padding: 20px; }
        .gemini-star { width: 60px; height: 60px; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
        
        .greeting { font-size: 26px; font-weight: 400; color: #1f1f1f; margin-bottom: 30px; }
        .greeting span { background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }

        #chatBox { width: 100%; max-width: 600px; display: none; flex-direction: column; gap: 20px; padding: 20px; padding-bottom: 120px; margin: auto; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 20px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
        .user-msg { background: #e9eef6; align-self: flex-end; border-radius: 20px 20px 4px 20px; }
        .ai-msg { background: transparent; align-self: flex-start; display: flex; gap: 10px; border-right: 3px solid #4285f4; padding-right: 10px; }

        .input-container { position: fixed; bottom: 20px; width: 90%; max-width: 600px; left: 50%; transform: translateX(-50%); background: #f0f4f9; border-radius: 30px; padding: 8px 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-container input { flex: 1; border: none; background: transparent; outline: none; padding: 12px; font-size: 16px; }
        .send-btn { color: #4285f4; cursor: pointer; font-size: 20px; padding: 5px; }

        #settingsPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .panel { position: absolute; bottom: 0; width: 100%; background: white; border-radius: 28px 28px 0 0; padding: 30px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars" onclick="toggleSettings()" style="cursor:pointer; color: #5f6368;"></i>
        <h1>Nexus AI</h1>
        <i class="fas fa-user-circle" style="font-size:24px; color:#5f6368"></i>
    </div>

    <div class="main-content" id="welcomeArea">
        <img src="https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d4735304ef62291616149.svg" class="gemini-star">
        <div class="greeting">سلام، <span>محمد عمران</span><br>څنګه مرسته درسره کولی شم؟</div>
    </div>

    <div id="chatBox"></div>

    <div class="input-container">
        <i class="far fa-image" style="color: #5f6368;"></i>
        <input type="text" id="userInput" placeholder="دلته پوښتنه ولیکئ...">
        <i class="fas fa-paper-plane send-btn" onclick="askGemini()"></i>
    </div>

    <div id="settingsPanel" onclick="toggleSettings()">
        <div class="panel" onclick="event.stopPropagation()">
            <div style="width:40px; height:4px; background:#ccc; margin:auto; border-radius:10px; margin-bottom:20px;"></div>
            <h3>د جوړونکی معلومات</h3>
            <p><strong>نوم:</strong> محمد عمران عمر</p>
            <p><strong>پوهنتون:</strong> کابل پوهنتون</p>
            <p><strong>څانګه:</strong> پیداګوژي</p>
            <button onclick="toggleSettings()" style="width:100%; padding:15px; background:#f0f4f9; border:none; border-radius:15px; margin-top:10px;">بندول</button>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyCCEMD8x8r09NnTkMEIEbUC-KaeWZHEnsg"; // ستا کیلي دلته فعاله شوه

        function toggleSettings() {
            const p = document.getElementById('settingsPanel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        async function askGemini() {
            const input = document.getElementById('userInput');
            const welcome = document.getElementById('welcomeArea');
            const chat = document.getElementById('chatBox');
            const text = input.value.trim();
            
            if(!text) return;

            welcome.style.display = 'none';
            chat.style.display = 'flex';
            chat.innerHTML += `<div class="msg user-msg">${text}</div>`;
            input.value = "";
            window.scrollTo(0, document.body.scrollHeight);

            const aiDiv = document.createElement('div');
            aiDiv.className = 'msg ai-msg';
            aiDiv.innerHTML = `<span>نکسس ځواب لیکي...</span>`;
            chat.appendChild(aiDiv);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                aiDiv.querySelector('span').innerText = aiText;
            } catch (error) {
                aiDiv.querySelector('span').innerText = "بښنه غواړم، د انټرنیټ یا کیلي ستونزه شته.";
            }
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
