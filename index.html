<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استاد یار | Ustad Yar AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;700&display=swap');
        body { font-family: 'Noto Naskh Arabic', serif; background-color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="text-slate-800 h-screen flex overflow-hidden">

    <!-- ښی اړخ: مینو -->
    <aside class="w-72 bg-slate-900 text-white hidden md:flex flex-col shadow-2xl z-20">
        <div class="p-6 border-b border-slate-700 bg-slate-800">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center text-xl font-bold border-2 border-white shadow-lg">ع</div>
                <div>
                    <h2 class="font-bold text-lg">محمد عمران</h2>
                    <p class="text-xs text-slate-400">جغتو، وردګ</p>
                </div>
            </div>
        </div>
        <!-- تاریخچه -->
        <div class="p-4">
            <div class="bg-slate-800 rounded p-3 text-xs text-slate-400 mb-2">وروستي فایلونه:</div>
            <div class="flex items-center gap-2 text-xs text-slate-300 mb-2">
                <i class="fas fa-file-pdf text-red-400"></i>
                <span>بیولوژي_صنف_۱۰.pdf</span>
            </div>
        </div>
    </aside>

    <!-- اصلي برخه -->
    <main class="flex-1 flex flex-col relative bg-white">
        <header class="h-16 border-b flex items-center justify-between px-6 bg-white shadow-sm z-10">
            <h1 class="text-xl font-bold text-indigo-900 flex items-center gap-2">
                <i class="fas fa-robot text-indigo-600"></i> استاد یار <span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full border border-green-200">نسخه ۲.۰ (هوشمند)</span>
            </h1>
        </header>

        <!-- د چټ ساحه -->
        <div id="output-container" class="flex-1 overflow-y-auto p-6 custom-scroll bg-slate-50">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center opacity-100 transition-opacity duration-500">
                <div class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mb-4">
                    <i class="fas fa-wand-magic-sparkles text-4xl text-indigo-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">د فایل پر اساس دقیق پلان</h2>
                <p class="text-slate-500 text-sm max-w-md">خپل PDF راکړئ او ووایئ چې فارسي پلان غواړئ که پښتو، اونیز که ساعتوار.</p>
            </div>
            <div id="result-area" class="hidden max-w-4xl mx-auto space-y-6 pb-10"></div>
        </div>

        <!-- د کنټرول برخه -->
        <div class="bg-white border-t p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-30">
            <div class="max-w-4xl mx-auto">
                <!-- د اپشنونو انتخاب -->
                <div class="flex flex-wrap gap-3 mb-3 items-center">
                    <label class="cursor-pointer flex items-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-sm border border-slate-300 transition">
                        <i class="fas fa-paperclip text-slate-500"></i>
                        <span id="file-label">فایل اپلود (PDF/Word)</span>
                        <input type="file" class="hidden" id="file-input" onchange="updateFileLabel()">
                    </label>
                    
                    <div class="h-6 w-px bg-slate-300 mx-1"></div>

                    <!-- د پلان ډولونه -->
                    <div class="flex gap-3 text-sm font-medium">
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="radio" name="type" value="weekly" class="accent-indigo-600 w-4 h-4" checked>
                            <span>هفته وار</span>
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="radio" name="type" value="daily" class="accent-indigo-600 w-4 h-4">
                            <span>ساعتوار</span>
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input type="radio" name="type" value="exam" class="accent-indigo-600 w-4 h-4">
                            <span>سوالونه</span>
                        </label>
                    </div>
                </div>

                <!-- د متن بکس -->
                <div class="relative bg-white border-2 border-slate-300 rounded-2xl focus-within:border-indigo-500 focus-within:ring-4 focus-within:ring-indigo-500/20 transition">
                    <textarea id="user-prompt" rows="2" class="w-full bg-transparent p-3 pl-12 outline-none resize-none text-slate-800 placeholder-slate-400" placeholder="مثلاً: د دې فایل لپاره په فارسي ژبه د یوې اونۍ پلان جوړ کړه..."></textarea>
                    <button onclick="generateSmartResponse()" class="absolute left-2 bottom-2 bg-indigo-600 hover:bg-indigo-700 text-white w-10 h-10 rounded-xl flex items-center justify-center transition shadow-md">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function updateFileLabel() {
            const fileInput = document.getElementById('file-input');
            const label = document.getElementById('file-label');
            if (fileInput.files.length > 0) {
                label.textContent = fileInput.files[0].name;
                label.parentElement.classList.add('bg-green-100', 'border-green-300', 'text-green-800');
                label.parentElement.classList.remove('bg-slate-100');
            }
        }

        function generateSmartResponse() {
            const prompt = document.getElementById('user-prompt').value.toLowerCase();
            const fileInput = document.getElementById('file-input');
            const type = document.querySelector('input[name="type"]:checked').value;
            const fileName = fileInput.files.length > 0 ? fileInput.files[0].name : "نامعلوم فایل";
            
            const outputArea = document.getElementById('result-area');
            document.getElementById('welcome-screen').classList.add('hidden');
            outputArea.classList.remove('hidden');

            // 1. د کارونکي پیغام ښودل
            outputArea.innerHTML += `
                <div class="flex gap-4 mb-6 justify-end">
                    <div class="bg-indigo-600 text-white p-3 rounded-2xl rounded-tr-none max-w-2xl shadow text-sm">
                        <p>${document.getElementById('user-prompt').value}</p>
                        ${fileInput.files.length > 0 ? `<div class="mt-2 border-t border-indigo-500 pt-2 text-xs flex items-center gap-1"><i class="fas fa-file"></i> ${fileName}</div>` : ''}
                    </div>
                    <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center flex-shrink-0 text-xs font-bold">ع</div>
                </div>
            `;

            // 2. د ځواب "Loading" حالت
            const loadingId = 'loading-' + Date.now();
            outputArea.innerHTML += `
                <div id="${loadingId}" class="flex gap-4 mb-6">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-robot"></i></div>
                    <div class="bg-white border border-slate-200 p-4 rounded-2xl rounded-tl-none shadow-sm">
                        <div class="flex space-x-1 space-x-reverse">
                            <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce"></div>
                            <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                            <div class="w-2 h-2 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        </div>
                        <span class="text-xs text-slate-400 mt-2 block">د ${fileName} تحلیل روان دی...</span>
                    </div>
                </div>
            `;
            document.getElementById('user-prompt').value = '';
            outputArea.scrollIntoView({ behavior: 'smooth', block: 'end' });

            // 3. د هوښیار منطق پلي کول (Simulated Logic)
            setTimeout(() => {
                document.getElementById(loadingId).remove();
                
                let isFarsi = prompt.includes("فارسی") || prompt.includes("دری") || prompt.includes("farsi") || prompt.includes("dari");
                let htmlContent = "";

                // ==== حالت اول: هفته وار پلان (Weekly) ====
                if (type === 'weekly') {
                    if (isFarsi) {
                        // فارسي هفته وار پلان
                        htmlContent = `
                            <div class="bg-white border border-slate-200 p-0 rounded-xl shadow-sm overflow-hidden animate-fade-in w-full">
                                <div class="bg-teal-700 text-white p-4 flex justify-between items-center">
                                    <h3 class="font-bold"><i class="fas fa-calendar-week ml-2"></i>پلان درسی هفته‌وار</h3>
                                    <span class="text-xs bg-teal-800 px-2 py-1 rounded opacity-80">منبع: ${fileName}</span>
                                </div>
                                <div class="p-4 overflow-x-auto">
                                    <table class="w-full text-sm text-right border-collapse min-w-[500px]">
                                        <thead>
                                            <tr class="bg-slate-50 text-slate-600 border-b-2 border-teal-600">
                                                <th class="p-3 border">روز</th>
                                                <th class="p-3 border">موضوع درس</th>
                                                <th class="p-3 border">فعالیت صنفی</th>
                                                <th class="p-3 border">کار خانگی</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td class="p-3 border font-bold text-teal-700">شنبه</td>
                                                <td class="p-3 border">مقدمه فصل سوم (خواص مواد)</td>
                                                <td class="p-3 border">بحث گروپی در مورد جامدات</td>
                                                <td class="p-3 border text-xs">حل تمرین صفحه ۴۵</td>
                                            </tr>
                                            <tr class="bg-slate-50">
                                                <td class="p-3 border font-bold text-teal-700">یک‌شنبه</td>
                                                <td class="p-3 border">حالات ماده (مایعات)</td>
                                                <td class="p-3 border">تجربه عملی: جوشیدن آب</td>
                                                <td class="p-3 border text-xs">نوشتن گزارش لابراتوار</td>
                                            </tr>
                                            <tr>
                                                <td class="p-3 border font-bold text-teal-700">دوشنبه</td>
                                                <td class="p-3 border">گازها و تراکم پذیری</td>
                                                <td class="p-3 border">نمایش پوکانه و فشار هوا</td>
                                                <td class="p-3 border text-xs">سوالات تشریحی فصل</td>
                                            </tr>
                                            <tr class="bg-slate-50">
                                                <td class="p-3 border font-bold text-teal-700">سه‌شنبه</td>
                                                <td class="p-3 border text-red-500">ارزیابی ربع وار</td>
                                                <td class="p-3 border">اخذ امتحان کتبی</td>
                                                <td class="p-3 border text-xs">-</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                    <div class="mt-4 text-left">
                                        <button class="text-teal-700 text-xs border border-teal-700 px-3 py-1 rounded hover:bg-teal-50"><i class="fas fa-download ml-1"></i>دانلود PDF</button>
                                    </div>
                                </div>
                            </div>`;
                    } else {
                        // پښتو هفته وار پلان
                        htmlContent = `
                            <div class="bg-white border border-slate-200 p-0 rounded-xl shadow-sm overflow-hidden animate-fade-in w-full">
                                <div class="bg-blue-700 text-white p-4 flex justify-between items-center">
                                    <h3 class="font-bold"><i class="fas fa-calendar-week ml-2"></i>اونیز (هفته وار) درسي پلان</h3>
                                    <span class="text-xs bg-blue-800 px-2 py-1 rounded opacity-80">فایل: ${fileName}</span>
                                </div>
                                <div class="p-4 overflow-x-auto">
                                    <table class="w-full text-sm text-right border-collapse">
                                        <thead>
                                            <tr class="bg-slate-50 text-slate-600 border-b-2 border-blue-600">
                                                <th class="p-3 border">ورځ</th>
                                                <th class="p-3 border">موضوع</th>
                                                <th class="p-3 border">لیدل شوي فایل محتوا</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td class="p-3 border font-bold text-blue-700">شنبه</td>
                                                <td class="p-3 border">د لومړي فصل پیژندنه</td>
                                                <td class="p-3 border text-xs text-slate-500">له فایل څخه استخراج شوی: مخ ۱-۵</td>
                                            </tr>
                                            <tr>
                                                <td class="p-3 border font-bold text-blue-700">یکشنبه</td>
                                                <td class="p-3 border">تشریحي بحث</td>
                                                <td class="p-3 border text-xs text-slate-500">له فایل څخه استخراج شوی: مخ ۶-۱۰</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>`;
                    }
                }
                
                // ==== حالت دوم: ساعتوار پلان ====
                else if (type === 'daily') {
                    htmlContent = `
                        <div class="bg-white border-l-4 border-green-500 p-6 rounded-r-xl shadow-sm">
                            <h3 class="font-bold text-lg text-green-800 mb-2">ساعتوار پلان (۴۵ دقیقې)</h3>
                            <p class="text-sm text-slate-600 mb-4">دا پلان د <span class="font-bold bg-slate-100 px-1 rounded">${fileName}</span> کتاب له مخې ترتیب شو:</p>
                            <ul class="space-y-3 relative border-r border-slate-200 mr-2 pr-4">
                                <li class="relative">
                                    <div class="absolute -right-[21px] top-1 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
                                    <span class="text-xs text-slate-400 block">۰-۱۰ دقیقې</span>
                                    <strong>ذهني چمتووالی:</strong> د تېر درس پوښتنې.
                                </li>
                                <li class="relative">
                                    <div class="absolute -right-[21px] top-1 w-3 h-3 bg-green-500 rounded-full border-2 border-white"></div>
                                    <span class="text-xs text-slate-400 block">۱۰-۳۵ دقیقې</span>
                                    <strong>اصلي درس:</strong> د نوي عنوان تشریح.
                                </li>
                            </ul>
                        </div>
                    `;
                }

                // ==== حالت سوم: سوالونه ====
                else {
                    htmlContent = `
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-purple-100">
                            <h3 class="font-bold text-purple-800 mb-4">استخراج شوي سوالونه</h3>
                            <div class="space-y-2">
                                <div class="p-3 bg-purple-50 rounded text-sm">۱. د مایعاتو د تودوخې نقطه څه ته وايي؟ (تشریحي)</div>
                                <div class="p-3 bg-purple-50 rounded text-sm">۲. اوبه په څو درجو کې جوشیږي؟ (څلور ځوابه)</div>
                            </div>
                        </div>
                    `;
                }

                // ځواب اضافه کول
                const responseBubble = `
                    <div class="flex gap-4 animate-fade-in">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-robot"></i></div>
                        <div class="flex-1">
                            ${htmlContent}
                        </div>
                    </div>
                `;
                
                outputArea.innerHTML += responseBubble;
                outputArea.scrollIntoView({ behavior: 'smooth', block: 'end' });

            }, 1500);
        }
    </script>
</body>
</html>
