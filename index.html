<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI - Mohammad Imran</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial; background: #fff; margin: 0; color: #1f1f1f; }
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .welcome { text-align: center; margin-top: 10vh; padding: 20px; }
        .welcome h2 { font-size: 28px; background: linear-gradient(90deg, #4285f4, #9b72cb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #chatBox { max-width: 600px; margin: auto; padding: 20px; display: none; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; }
        .user { background: #e9eef6; align-self: flex-end; }
        .ai { align-self: flex-start; border-right: 3px solid #4285f4; background: #f8f9fa; }
        .input-area { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; background: #f0f4f9; border-radius: 30px; padding: 10px 20px; display: flex; align-items: center; }
        .input-area input { flex: 1; border: none; background: transparent; outline: none; padding: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bars" onclick="alert('محمد عمران عمر \nکابل پوهنتون')"></i>
        <h1 style="font-size: 18px; color: #4285f4;">Nexus AI</h1>
        <i class="fas fa-user-circle"></i>
    </div>

    <div id="welcome" class="welcome">
        <img src="https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d4735304ef62291616149.svg" width="50">
        <h2>سلام، عمران جانه!<br>څنګه مرسته درسره کولی شم؟</h2>
    </div>

    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="دلته پوښتنه ولیکئ...">
        <i class="fas fa-paper-plane" id="sendBtn" style="color:#4285f4; cursor:pointer"></i>
    </div>

    <script>
        // خپله نوې کیلي له عکس څخه کاپي کړه او دلته یې د ننه په " " کې واچوه
        const API_KEY = "AIzaSyAc3De8VaviRejgB1SzaCdqVWwehedhU..."; 

        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('userInput');
            const welcome = document.getElementById('welcome');
            const chatBox = document.getElementById('chatBox');
            const text = input.value.trim();

            if (!text) return;

            welcome.style.display = 'none';
            chatBox.style.display = 'flex';
            chatBox.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";

            const aiMsg = document.createElement('div');
            aiMsg.className = 'msg ai';
            aiMsg.innerText = "نکسس ځواب لیکي...";
            chatBox.appendChild(aiMsg);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                aiMsg.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                aiMsg.innerText = "بښنه غواړم، په نښلولو کې ستونزه وه.";
            }
            window.scrollTo(0, document.body.scrollHeight);
        };
    </script>
</body>
</html>
