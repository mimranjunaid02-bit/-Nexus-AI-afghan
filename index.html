<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>استاد یار AI</title>
</head>

<body>

<h2>📘 استاد یار AI</h2>

<input id="subject" placeholder="Subject"><br><br>
<input id="topic" placeholder="Topic"><br><br>

<input type="file" id="file"><br><br>

<button onclick="generate()">Generate AI Plan + Questions</button>

<pre id="output"></pre>

<script>
async function generate(){
    let subject = document.getElementById("subject").value;
    let topic = document.getElementById("topic").value;

    let res = await fetch("http://localhost:3000/generate", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({subject, topic})
    });

    let data = await res.json();
    document.getElementById("output").innerText = data.result;
}
</script>

</body>
</html>
